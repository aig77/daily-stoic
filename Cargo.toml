[workspace.lints.rust]
unsafe_code = "forbid"
# unused = "allow" # For experimental dev

[package]
name = "daily-stoic-api-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.6"
chrono = { version = "0.4.42", features = ["serde"] }
fastrand = "2.3.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.48.0", features = ["full"] }

[dev-dependencies]
tower = "0.5"
http-body-util = "0.1"
