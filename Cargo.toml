[workspace.lints.rust]
unsafe_code = "forbid"
# unused = "allow" # For experimental dev

[package]
name = "daily-stoic"
version = "0.1.0"
edition = "2024"
default-run = "daily-stoic"

[dependencies]
axum = "0.8.6"
chrono = { version = "0.4.42", features = ["serde"] }
dotenvy = "0.15.7"
fastrand = "2.3.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.9", features = ["runtime-tokio", "any", "sqlite", "chrono", "uuid"] }
tokio = { version = "1.48.0", features = ["full"] }
uuid = { version = "1.23.2", features = ["v4"] }

[dev-dependencies]
tower = "0.5"
http-body-util = "0.1"
