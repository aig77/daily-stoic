{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
  <form hx-post="/register/{{ id }}" hx-target="#email-taken">
    <h1>Register</h1>
    <input type="email" name="email" placeholder="Enter your email" />
    <button type="submit">Register</button>
  </form>
  <div id="email-taken"></div>
{% endblock %}
