{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 5rem auto 0">
  <article>
    <hgroup style="text-align: center">
      <h2>Welcome back</h2>
      <p>Enter your email to receive a login code.</p>
    </hgroup>
    <form hx-post="/login" hx-target="body" hx-swap="outerHTML">
      <input type="email" name="email" autocomplete="email" required autofocus style="text-align: center" />
      <button type="submit">Send Code</button>
    </form>
  </article>
</div>
{% endblock %}
