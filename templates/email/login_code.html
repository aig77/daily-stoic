<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:4px;text-align:center;">
              <span style="font-size:15px;letter-spacing:0.12em;text-transform:uppercase;">Daily Stoic</span>
            </td>
          </tr>

          <!-- Subtitle -->
          <tr>
            <td style="padding-bottom:28px;text-align:center;">
              <span style="font-size:13px;">Login Code</span>
            </td>
          </tr>

          <!-- Code card -->
          <tr>
            <td style="border:1px solid #ccc;border-radius:6px;padding:36px 40px;text-align:center;">
              <p style="margin:0 0 20px 0;font-size:14px;">Enter this code to sign in</p>
              <p style="margin:0 0 20px 0;font-size:48px;font-weight:bold;letter-spacing:0.15em;font-family:Georgia,serif;">{{ code }}</p>
              <p style="margin:0;font-size:12px;">Expires in 5 minutes</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:40px 8px 0 8px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding-top:32px;border-top:1px solid #ccc;text-align:center;">
                    <p style="margin:0;font-size:11px;">If you didn't request this, you can safely ignore it.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
